version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 3
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 30
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
    groups:
      nextjs:
        patterns:
          - "next"
          - "eslint-config-next"
      liveblocks:
        patterns:
          - "@liveblocks/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      patch-updates:
        update-types:
          - "patch"
