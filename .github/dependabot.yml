version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 30
    groups:
      patch-updates:
        update-types:
          - "patch"
