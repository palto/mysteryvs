name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - uses: dependabot/fetch-metadata@v2
        id: fetch-metadata

      - name: Auto-merge minor and patch updates
        if: |
          steps.fetch-metadata.outputs.package-ecosystem == 'github_actions' ||
          steps.fetch-metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.fetch-metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.fetch-metadata.outputs.dependency-type == 'indirect'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
