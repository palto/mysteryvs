name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run verify

      - run: SESSION_SECRET=$(openssl rand -base64 32) npm run build
        env:
          LIVEBLOCKS_SECRET: sk_ci_placeholder
